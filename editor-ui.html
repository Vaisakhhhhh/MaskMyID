<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaskMyID - Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="flex flex-col h-full antialiased font-sans">

    <header
        class="flex items-center justify-between px-6 py-4 border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-md">
        <div class="flex flex-col">
            <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                MaskMyID <span
                    class="text-xs font-normal bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/20">v1.0</span>
            </h1>
            <p class="text-xs text-zinc-400 hidden sm:block">Privacy-first document masking. Your files never leave your
                device.</p>
        </div>

        <div class="flex items-center gap-3">
            <button
                class="flex items-center gap-2 px-4 py-2 text-sm font-medium transition rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800">
                <i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i>
                Remove Image
            </button>
            <button
                class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-blue-600 rounded-lg hover:bg-blue-500 shadow-md shadow-blue-600/10">
                <i data-lucide="download" class="w-4 h-4"></i>
                Export Image
            </button>
        </div>
    </header>

    <main class="flex flex-1 flex-col lg:flex-row overflow-hidden">

        <aside
            class="w-full lg:w-80 bg-zinc-900 border-b lg:border-b-0 lg:border-r border-zinc-800 p-5 flex flex-col gap-6 overflow-y-auto">

            <div>
                <label class="text-xs font-semibold tracking-wider uppercase text-zinc-400 block mb-3">1. Mask
                    Shape</label>
                <div class="grid grid-cols-2 gap-2">
                    <button
                        class="flex flex-col items-center justify-center p-3 rounded-xl border border-blue-500 bg-blue-500/10 text-blue-400 font-medium text-sm transition">
                        <i data-lucide="square" class="w-5 h-5 mb-1.5"></i>
                        Rectangle
                    </button>
                    <button
                        class="flex flex-col items-center justify-center p-3 rounded-xl border border-zinc-800 bg-zinc-800/40 hover:bg-zinc-800 text-zinc-300 hover:text-white font-medium text-sm transition">
                        <i data-lucide="circle" class="w-5 h-5 mb-1.5"></i>
                        Circle
                    </button>
                </div>
            </div>

            <hr class="border-zinc-800" />

            <div>
                <label class="text-xs font-semibold tracking-wider uppercase text-zinc-400 block mb-3">2. Mask
                    Style</label>
                <div class="flex flex-col gap-2">
                    <button
                        class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg border border-zinc-700 bg-zinc-800 text-sm font-medium text-white transition text-left">
                        <span class="w-4 h-4 rounded bg-black border border-zinc-600"></span>
                        Solid Black
                    </button>
                    <button
                        class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg border border-transparent hover:border-zinc-700 bg-zinc-800/40 hover:bg-zinc-800 text-sm font-medium text-zinc-300 hover:text-white transition text-left">
                        <i data-lucide="grid" class="w-4 h-4 text-zinc-400"></i>
                        Pixelate
                    </button>
                    <button
                        class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg border border-transparent hover:border-zinc-700 bg-zinc-800/40 hover:bg-zinc-800 text-sm font-medium text-zinc-300 hover:text-white transition text-left">
                        <i data-lucide="eye-off" class="w-4 h-4 text-zinc-400"></i>
                        Blur
                    </button>
                </div>
            </div>

            <hr class="border-zinc-800" />

            <div>
                <label class="text-xs font-semibold tracking-wider uppercase text-zinc-400 block mb-3">Actions</label>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <button
                        class="flex items-center justify-center gap-1.5 py-2 rounded-lg bg-zinc-800/60 hover:bg-zinc-800 text-xs font-medium text-zinc-300 transition disabled:opacity-40"
                        disabled>
                        <i data-lucide="undo-2" class="w-3.5 h-3.5"></i> Undo
                    </button>
                    <button
                        class="flex items-center justify-center gap-1.5 py-2 rounded-lg bg-zinc-800/60 hover:bg-zinc-800 text-xs font-medium text-zinc-300 transition disabled:opacity-40"
                        disabled>
                        <i data-lucide="redo-2" class="w-3.5 h-3.5"></i> Redo
                    </button>
                </div>
                <button
                    class="w-full flex items-center justify-center gap-2 py-2 rounded-lg bg-zinc-800/40 hover:bg-red-950/30 border border-transparent hover:border-red-900/50 text-xs font-medium text-zinc-400 hover:text-red-400 transition mb-2">
                    <i data-lucide="trash" class="w-3.5 h-3.5"></i> Delete Selected Layer
                </button>
                <button
                    class="w-full flex items-center justify-center gap-2 py-2 rounded-lg bg-zinc-800/20 hover:bg-zinc-800 border border-transparent hover:border-zinc-700 text-xs font-medium text-zinc-400 hover:text-zinc-200 transition">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Clear Canvas
                </button>
            </div>

        </aside>

        <section class="flex-1 bg-zinc-950 p-6 flex items-center justify-center overflow-auto relative pattern-grid">
            <div
                class="relative max-h-full max-w-4xl rounded-2xl overflow-hidden border border-zinc-800 bg-zinc-900/20 shadow-2xl p-2 group">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=1000"
                    alt="Document Editor Workspace" class="max-h-[70vh] rounded-xl object-contain shadow-lg block" />

                <div class="absolute inset-2 pointer-events-none rounded-xl border border-white/5 mix-blend-overlay">
                </div>
            </div>
        </section>

    </main>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
