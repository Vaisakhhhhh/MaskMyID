<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaskMyID - Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="flex flex-col h-screen antialiased font-sans overflow-hidden select-none">

    <header
        class="flex items-center justify-between px-4 py-3 sm:px-6 sm:py-4 border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-md flex-shrink-0 z-10">
        <div class="flex flex-col">
            <h1 class="text-lg sm:text-xl font-bold tracking-tight text-white flex items-center gap-2">
                MaskMyID <span
                    class="text-xs font-normal bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/20">v1.0</span>
            </h1>
            <p class="text-xs text-zinc-400 hidden sm:block">Privacy-first document masking. Your files never leave your
                device.</p>
        </div>

        <div class="flex items-center gap-2 sm:gap-3">
            <button
                class="flex items-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium transition rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800">
                <i data-lucide="trash-2" class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-red-400"></i>
                <span class="hidden xs:inline">Remove Image</span>
                <span class="xs:hidden">Remove</span>
            </button>
            <button
                class="flex items-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-semibold text-white transition bg-blue-600 rounded-lg hover:bg-blue-500 shadow-md shadow-blue-600/10">
                <i data-lucide="download" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></i>
                Export <span class="hidden xs:inline">Image</span>
            </button>
        </div>
    </header>

    <main class="flex flex-1 flex-col lg:flex-row overflow-hidden min-h-0">

        <section
            class="flex-1 bg-zinc-950 p-4 sm:p-6 flex items-center justify-center overflow-auto relative order-1 lg:order-2 min-h-0">
            <div
                class="relative max-h-full max-w-full rounded-xl sm:rounded-2xl overflow-hidden border border-zinc-800 bg-zinc-900/20 shadow-2xl p-1.5 sm:p-2 group">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=1000"
                    alt="Document Editor Workspace"
                    class="max-h-[40vh] sm:max-h-[55vh] lg:max-h-[70vh] w-auto h-auto rounded-lg sm:rounded-xl object-contain shadow-lg block mx-auto" />

                <div
                    class="absolute inset-1.5 sm:inset-2 pointer-events-none rounded-lg sm:rounded-xl border border-white/5 mix-blend-overlay">
                </div>
            </div>
        </section>

        <aside
            class="w-full lg:w-80 bg-zinc-900 border-t lg:border-t-0 lg:border-r border-zinc-800 p-4 sm:p-5 flex flex-col gap-4 sm:gap-6 overflow-y-auto max-h-[45vh] lg:max-h-none order-2 lg:order-1 flex-shrink-0">

            <div>
                <label
                    class="text-[10px] sm:text-xs font-semibold tracking-wider uppercase text-zinc-400 block mb-2 sm:mb-3">1.
                    Mask Shape</label>
                <div class="grid grid-cols-2 gap-2">
                    <button
                        class="flex flex-row lg:flex-col items-center justify-center gap-2 lg:gap-0 p-2.5 sm:p-3 rounded-xl border border-blue-500 bg-blue-500/10 text-blue-400 font-medium text-xs sm:text-sm transition">
                        <i data-lucide="square" class="w-4 h-4 lg:w-5 lg:h-5 lg:mb-1.5"></i>
                        Rectangle
                    </button>
                    <button
                        class="flex flex-row lg:flex-col items-center justify-center gap-2 lg:gap-0 p-2.5 sm:p-3 rounded-xl border border-zinc-800 bg-zinc-800/40 hover:bg-zinc-800 text-zinc-300 hover:text-white font-medium text-xs sm:text-sm transition">
                        <i data-lucide="circle" class="w-4 h-4 lg:w-5 lg:h-5 lg:mb-1.5"></i>
                        Circle
                    </button>
                </div>
            </div>

            <hr class="border-zinc-800 hidden lg:block" />

            <div>
                <label
                    class="text-[10px] sm:text-xs font-semibold tracking-wider uppercase text-zinc-400 block mb-2 sm:mb-3">2.
                    Mask Style</label>
                <div class="grid grid-cols-3 lg:flex lg:flex-col gap-2">
                    <button
                        class="flex items-center justify-center lg:justify-start gap-2 lg:gap-3 w-full px-2 py-2.5 sm:p-2.5 rounded-lg border border-zinc-700 bg-zinc-800 text-xs sm:text-sm font-medium text-white transition">
                        <span
                            class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded bg-black border border-zinc-600 flex-shrink-0"></span>
                        <span class="truncate">Solid Black</span>
                    </button>
                    <button
                        class="flex items-center justify-center lg:justify-start gap-2 lg:gap-3 w-full px-2 py-2.5 sm:p-2.5 rounded-lg border border-transparent hover:border-zinc-700 bg-zinc-800/40 hover:bg-zinc-800 text-xs sm:text-sm font-medium text-zinc-300 hover:text-white transition">
                        <i data-lucide="grid" class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-zinc-400 flex-shrink-0"></i>
                        <span class="truncate">Pixelate</span>
                    </button>
                    <button
                        class="flex items-center justify-center lg:justify-start gap-2 lg:gap-3 w-full px-2 py-2.5 sm:p-2.5 rounded-lg border border-transparent hover:border-zinc-700 bg-zinc-800/40 hover:bg-zinc-800 text-xs sm:text-sm font-medium text-zinc-300 hover:text-white transition">
                        <i data-lucide="eye-off" class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-zinc-400 flex-shrink-0"></i>
                        <span class="truncate">Blur</span>
                    </button>
                </div>
            </div>

            <hr class="border-zinc-800" />

            <div>
                <label
                    class="text-[10px] sm:text-xs font-semibold tracking-wider uppercase text-zinc-400 block mb-2 sm:mb-3">Actions</label>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <button
                        class="flex items-center justify-center gap-1.5 py-2 rounded-lg bg-zinc-800/60 hover:bg-zinc-800 text-xs font-medium text-zinc-300 transition disabled:opacity-40"
                        disabled>
                        <i data-lucide="undo-2" class="w-3.5 h-3.5"></i> Undo
                    </button>
                    <button
                        class="flex items-center justify-center gap-1.5 py-2 rounded-lg bg-zinc-800/60 hover:bg-zinc-800 text-xs font-medium text-zinc-300 transition disabled:opacity-40"
                        disabled>
                        <i data-lucide="redo-2" class="w-3.5 h-3.5"></i> Redo
                    </button>
                </div>
                <div class="grid grid-cols-2 lg:flex lg:flex-col gap-2">
                    <button
                        class="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg bg-zinc-800/40 hover:bg-red-950/30 border border-transparent hover:border-red-900/50 text-xs font-medium text-zinc-400 hover:text-red-400 transition">
                        <i data-lucide="trash" class="w-3.5 h-3.5"></i> <span class="truncate">Delete Layer</span>
                    </button>
                    <button
                        class="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg bg-zinc-800/20 hover:bg-zinc-800 border border-transparent hover:border-zinc-700 text-xs font-medium text-zinc-400 hover:text-zinc-200 transition">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> <span class="truncate">Clear Canvas</span>
                    </button>
                </div>
            </div>

        </aside>

    </main>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
